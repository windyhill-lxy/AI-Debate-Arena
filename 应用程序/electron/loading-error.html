<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>AI 辩论场 · 启动中</title>
    <style>
      body {
        font-family: "Segoe UI", system-ui, sans-serif;
        margin: 0;
        padding: 48px 32px;
        background: #f7f4ef;
        color: #26231f;
      }
      h1 { font-size: 22px; margin: 0 0 12px; }
      p { line-height: 1.6; max-width: 640px; }
      code { background: #ebe6dc; padding: 2px 6px; border-radius: 4px; }
      .actions { margin-top: 24px; display: flex; gap: 12px; }
      button {
        padding: 10px 18px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
      }
      .primary { background: #2f4a3a; color: #fff; }
      .ghost { background: #e8e2d8; color: #26231f; }
    </style>
  </head>
  <body>
    <h1 id="title">正在启动服务…</h1>
    <p id="detail">请稍候，正在加载辩论场后端与界面。</p>
    <div class="actions">
      <button class="primary" id="retry">重试</button>
      <button class="ghost" id="openLogs">打开日志目录</button>
    </div>
    <script>
      const params = new URLSearchParams(location.search);
      const failed = params.get("failed") === "1";
      const logDir = params.get("logDir") || "";
      if (failed) {
        document.getElementById("title").textContent = "服务未能就绪";
        document.getElementById("detail").innerHTML =
          "后端或前端服务启动超时。请关闭占用 <code>5173</code> / <code>9000</code> 端口的程序后重试。" +
          (logDir ? `<br>日志目录：<code>${logDir}</code>` : "");
      }
      document.getElementById("retry").addEventListener("click", () => {
        location.href = "http://127.0.0.1:5173/welcome";
      });
      document.getElementById("openLogs").addEventListener("click", () => {
        if (window.debateDesktop?.openPath) window.debateDesktop.openPath(logDir);
      });
    </script>
  </body>
</html>
