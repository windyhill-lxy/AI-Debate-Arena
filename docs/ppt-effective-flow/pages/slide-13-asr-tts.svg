  <text x="46" y="858" class="code">services/asr.py · services/tts.py · services/tts_policy.py · hooks/useAudioQueue.js</text>
  <text x="46" y="882" class="subtitle">来源：PPT有效信息页内容 + docs/ai-debate-project-flow.mmd + 项目实际后端/前端文件。</text>
