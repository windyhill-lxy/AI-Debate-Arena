      <foreignObject x="331" y="562" width="158" height="60">
        <div xmlns="http://www.w3.org/1999/xhtml" class="nodeText"><div class="label">录音上传</div></div>
      </foreignObject>
    </g>

    <g class="node main" id="asr">
