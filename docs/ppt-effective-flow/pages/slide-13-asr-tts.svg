<path d="M172.5 483 L315 589" fill="none" stroke="#5a5148" stroke-width="2.3" marker-end="url(#arrow)"/><text x="243.75" y="528" class="edgeLabel">用户说话</text>
<path d="M505 589 L560 589" fill="none" stroke="#5a5148" stroke-width="2.3" marker-end="url(#arrow)"/>
<path d="M750 589 L805 604" fill="none" stroke="#5a5148" stroke-width="2.3" marker-end="url(#arrow)"/>
<path d="M1010 604 L1050 409" fill="none" stroke="#5a5148" stroke-width="2.3" marker-end="url(#arrow)"/><text x="1030" y="498.5" class="edgeLabel">是</text></g>
  <g>
      <g class="node programDecision" id="mode">
        <polygon points="172.5,365 275,424 172.5,483 70,424" fill="#e7f0ff" stroke="#5477a6" stroke-width="2"/>
        <foreignObject x="96" y="387" width="153" height="74">
          <div xmlns="http://www.w3.org/1999/xhtml" class="nodeText"><div class="label">当前是用户说话还是AI发言</div></div>
        </foreignObject>
      </g>

    <g class="node main" id="record">
