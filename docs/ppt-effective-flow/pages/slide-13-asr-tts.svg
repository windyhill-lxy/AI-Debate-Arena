        <div xmlns="http://www.w3.org/1999/xhtml" class="nodeText"><div class="label">顺序播放音频</div><div class="detail">避免重叠</div></div>
      </foreignObject>
    </g>

      <g class="node data" id="speech">
        <path d="M1050,379 C1050,358 1240,358 1240,379 V439 C1240,460 1050,460 1050,439 Z" fill="#eef5ec" stroke="#557a55" stroke-width="2"/>
