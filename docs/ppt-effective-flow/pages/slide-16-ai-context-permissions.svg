      <foreignObject x="821" y="562" width="158" height="60">
        <div xmlns="http://www.w3.org/1999/xhtml" class="nodeText"><div class="label">隐藏越权内容</div></div>
      </foreignObject>
    </g>

      <g class="node aiDecision" id="llm">
        <polygon points="1145,365 1240,421 1145,477 1050,421" fill="#f0e7ff" stroke="#7c5fb3" stroke-width="2"/>
        <foreignObject x="1076" y="387" width="138" height="68">
          <div xmlns="http://www.w3.org/1999/xhtml" class="nodeText"><div class="label">角色内思考发言</div></div>
        </foreignObject>
      </g></g>
  <text x="46" y="858" class="code">services/ai_context_manager.py · services/message_visibility.py · services/viewer_payload.py</text>
  <text x="46" y="882" class="subtitle">来源：PPT有效信息页内容 + docs/ai-debate-project-flow.mmd + 项目实际后端/前端文件。</text>
