<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900" role="img" aria-label="PPT 16｜AI 上下文管理与信息权限">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="rgba(104,86,64,0.075)" stroke-width="1"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 18 18" refX="15" refY="9" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M2 2 L16 9 L2 16 Z" fill="#5a5148"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#32261c" flood-opacity="0.1"/>
    </filter>
    <style>
      svg { background: #fbf7ef; font-family: "Microsoft YaHei", "Noto Sans SC", "PingFang SC", Arial, sans-serif; }
      .title { fill: #211b12; font-size: 34px; font-weight: 850; letter-spacing: 0; }
      .subtitle { fill: #6f5a47; font-size: 17px; font-weight: 650; letter-spacing: 0; }
      .legendText { fill: #211b12; font-size: 15px; font-weight: 800; }
      .node { filter: url(#shadow); }
      .nodeText { box-sizing: border-box; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: #5c4d3d; line-height: 1.25; overflow-wrap: anywhere; word-break: break-word; }
      .nodeText .label { font-size: 17px; font-weight: 850; }
      .nodeText .detail { margin-top: 4px; font-size: 12px; font-weight: 700; color: #7c6752; line-height: 1.2; }
      .programDecision .nodeText { color: #345f9c; }
      .aiDecision .nodeText { color: #7654b3; }
      .data .nodeText { color: #446f48; }
      .error .nodeText { color: #ad4e49; }
      .edgeLabel { fill: #4f463d; paint-order: stroke; stroke: #fbf7ef; stroke-width: 7px; stroke-linejoin: round; font-size: 14px; font-weight: 800; }
      .code { fill: #6f5a47; font-family: Consolas, "Courier New", monospace; font-size: 13px; }
    </style>
  </defs>
  <rect x="0" y="0" width="1280" height="900" fill="url(#grid)"/>
  <rect x="32" y="24" width="1216" height="98" rx="16" fill="#f7efe2" stroke="rgba(124,101,78,0.22)"/>
  <text x="56" y="67" class="title">PPT 16｜AI 上下文管理与信息权限</text>
  <text x="58" y="99" class="subtitle">不同角色只拿到自己应该看到的信息，防止立场混乱和提前越权。</text>
  <g><rect x="56" y="140" width="34" height="28" rx="5" fill="#f5efe2" stroke="#8a7b5a" stroke-width="1.6"/><text x="99" y="160" class="legendText">普通步骤</text></g>
<g><polygon points="226,138 242,154 226,170 210,154" fill="#e7f0ff" stroke="#5477a6" stroke-width="1.6"/><text x="253" y="160" class="legendText">系统检查</text></g>
<g><polygon points="380,138 396,154 380,170 364,154" fill="#f0e7ff" stroke="#7c5fb3" stroke-width="1.6"/><text x="407" y="160" class="legendText">AI判断</text></g>
<g><path d="M518,144 C518,134 552,134 552,144 V164 C552,174 518,174 518,164 Z" fill="#eef5ec" stroke="#557a55" stroke-width="1.6"/><ellipse cx="535" cy="144" rx="17" ry="6" fill="#eef5ec" stroke="#557a55" stroke-width="1.6"/><text x="561" y="160" class="legendText">保存/数据库</text></g>
<g><rect x="672" y="140" width="34" height="28" rx="5" fill="#fde7e5" stroke="#b45b55" stroke-width="1.6"/><text x="715" y="160" class="legendText">错误处理</text></g>
  <g><path d="M260 409 L560 428" fill="none" stroke="#5a5148" stroke-width="2.3" marker-end="url(#arrow)"/>
<path d="M505 229 L667.5 365" fill="none" stroke="#5a5148" stroke-width="2.3" marker-end="url(#arrow)"/>
<path d="M505 589 L667.5 491" fill="none" stroke="#5a5148" stroke-width="2.3" marker-end="url(#arrow)"/>
<path d="M775 428 L805 409" fill="none" stroke="#5a5148" stroke-width="2.3" marker-end="url(#arrow)"/><text x="790" y="410.5" class="edgeLabel">允许</text>
<path d="M667.5 491 L805 589" fill="none" stroke="#5a5148" stroke-width="2.3" marker-end="url(#arrow)"/><text x="736.25" y="532" class="edgeLabel">拒绝</text>
<path d="M995 409 L1050 421" fill="none" stroke="#5a5148" stroke-width="2.3" marker-end="url(#arrow)"/></g>
  <g>
    <g class="node main" id="role">
      <rect x="70" y="365" width="190" height="88" rx="10" fill="#f5efe2" stroke="#8a7b5a" stroke-width="2"/>
      <foreignObject x="86" y="382" width="158" height="60">
        <div xmlns="http://www.w3.org/1999/xhtml" class="nodeText"><div class="label">识别当前角色</div><div class="detail">正方/反方/裁判/观众</div></div>
      </foreignObject>
    </g>

      <g class="node data" id="public">
        <path d="M315,199 C315,178 505,178 505,199 V259 C505,280 315,280 315,259 Z" fill="#eef5ec" stroke="#557a55" stroke-width="2"/>
        <ellipse cx="410" cy="199" rx="95" ry="14" fill="#eef5ec" stroke="#557a55" stroke-width="2"/>
        <foreignObject x="331" y="209" width="158" height="54">
          <div xmlns="http://www.w3.org/1999/xhtml" class="nodeText"><div class="label">公开发言记录</div></div>
        </foreignObject>
      </g>

      <g class="node data" id="private">
        <path d="M315,559 C315,538 505,538 505,559 V619 C505,640 315,640 315,619 Z" fill="#eef5ec" stroke="#557a55" stroke-width="2"/>
        <ellipse cx="410" cy="559" rx="95" ry="14" fill="#eef5ec" stroke="#557a55" stroke-width="2"/>
        <foreignObject x="331" y="569" width="158" height="54">
          <div xmlns="http://www.w3.org/1999/xhtml" class="nodeText"><div class="label">本方队内信息</div></div>
        </foreignObject>
      </g>

      <g class="node programDecision" id="policy">
        <polygon points="667.5,365 775,428 667.5,491 560,428" fill="#e7f0ff" stroke="#5477a6" stroke-width="2"/>
        <foreignObject x="586" y="387" width="163" height="82">
          <div xmlns="http://www.w3.org/1999/xhtml" class="nodeText"><div class="label">请求内容是否在权限范围内</div></div>
        </foreignObject>
      </g>

    <g class="node main" id="ctx">
      <rect x="805" y="365" width="190" height="88" rx="10" fill="#f5efe2" stroke="#8a7b5a" stroke-width="2"/>
      <foreignObject x="821" y="382" width="158" height="60">
        <div xmlns="http://www.w3.org/1999/xhtml" class="nodeText"><div class="label">组装可见上下文</div></div>
      </foreignObject>
    </g>

    <g class="node error" id="deny">
