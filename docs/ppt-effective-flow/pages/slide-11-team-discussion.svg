  <g><path d="M165 273 L172.5 365" fill="none" stroke="#5a5148" stroke-width="2.3" marker-end="url(#arrow)"/>
<path d="M275 424 L315 409" fill="none" stroke="#5a5148" stroke-width="2.3" marker-end="url(#arrow)"/><text x="295" y="408.5" class="edgeLabel">是</text>
<path d="M172.5 365 L165 273" fill="none" stroke="#5a5148" stroke-width="2.3" marker-end="url(#arrow)"/><text x="168.75" y="311" class="edgeLabel">否，继续搜集</text>
<path d="M505 409 L560 424" fill="none" stroke="#5a5148" stroke-width="2.3" marker-end="url(#arrow)"/>
<path d="M662.5 483 L655 545" fill="none" stroke="#5a5148" stroke-width="2.3" marker-end="url(#arrow)"/><text x="658.75" y="506" class="edgeLabel">是</text>
<path d="M765 424 L805 424" fill="none" stroke="#5a5148" stroke-width="2.3" marker-end="url(#arrow)"/><text x="785" y="416" class="edgeLabel">否</text>
<path d="M750 589 L1145 453" fill="none" stroke="#5a5148" stroke-width="2.3" marker-end="url(#arrow)"/>
<path d="M1010 424 L1050 409" fill="none" stroke="#5a5148" stroke-width="2.3" marker-end="url(#arrow)"/></g>
  <g>
