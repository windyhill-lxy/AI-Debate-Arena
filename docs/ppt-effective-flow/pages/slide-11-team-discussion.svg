        <ellipse cx="1145" cy="379" rx="95" ry="14" fill="#eef5ec" stroke="#557a55" stroke-width="2"/>
        <foreignObject x="1066" y="389" width="158" height="54">
          <div xmlns="http://www.w3.org/1999/xhtml" class="nodeText"><div class="label">记录队内讨论</div><div class="detail">供公开发言使用</div></div>
