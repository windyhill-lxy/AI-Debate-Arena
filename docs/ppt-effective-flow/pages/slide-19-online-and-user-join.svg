        <div xmlns="http://www.w3.org/1999/xhtml" class="nodeText"><div class="label">房主创建房间</div></div>
      </foreignObject>
    </g>

      <g class="node programDecision" id="mode">
        <polygon points="417.5,365 520,424 417.5,483 315,424" fill="#e7f0ff" stroke="#5477a6" stroke-width="2"/>
        <foreignObject x="341" y="387" width="153" height="74">
          <div xmlns="http://www.w3.org/1999/xhtml" class="nodeText"><div class="label">选择哪种参与模式</div></div>
        </foreignObject>
      </g>

    <g class="node main" id="auto">
      <rect x="560" y="185" width="190" height="88" rx="10" fill="#f5efe2" stroke="#8a7b5a" stroke-width="2"/>
      <foreignObject x="576" y="202" width="158" height="60">
        <div xmlns="http://www.w3.org/1999/xhtml" class="nodeText"><div class="label">AI自主辩论</div><div class="detail">无人类席位</div></div>
      </foreignObject>
    </g>

    <g class="node main" id="single">
      <rect x="560" y="365" width="190" height="88" rx="10" fill="#f5efe2" stroke="#8a7b5a" stroke-width="2"/>
      <foreignObject x="576" y="382" width="158" height="60">
        <div xmlns="http://www.w3.org/1999/xhtml" class="nodeText"><div class="label">用户加入一方</div><div class="detail">选择正方/反方</div></div>
      </foreignObject>
    </g>

    <g class="node main" id="online">
      <rect x="560" y="545" width="190" height="88" rx="10" fill="#f5efe2" stroke="#8a7b5a" stroke-width="2"/>
      <foreignObject x="576" y="562" width="158" height="60">
        <div xmlns="http://www.w3.org/1999/xhtml" class="nodeText"><div class="label">多人联机邀请</div><div class="detail">公网链接/局域网</div></div>
      </foreignObject>
    </g>

      <g class="node data" id="seats">
        <path d="M805,379 C805,358 995,358 995,379 V439 C995,460 805,460 805,439 Z" fill="#eef5ec" stroke="#557a55" stroke-width="2"/>
        <ellipse cx="900" cy="379" rx="95" ry="14" fill="#eef5ec" stroke="#557a55" stroke-width="2"/>
        <foreignObject x="821" y="389" width="158" height="54">
          <div xmlns="http://www.w3.org/1999/xhtml" class="nodeText"><div class="label">席位与在线状态</div><div class="detail">presence/session</div></div>
        </foreignObject>
      </g>

    <g class="node main" id="run">
      <rect x="1050" y="365" width="190" height="88" rx="10" fill="#f5efe2" stroke="#8a7b5a" stroke-width="2"/>
      <foreignObject x="1066" y="382" width="158" height="60">
        <div xmlns="http://www.w3.org/1999/xhtml" class="nodeText"><div class="label">进入同一赛程推进</div><div class="detail">轮到真人则等待</div></div>
      </foreignObject>
    </g></g>
  <text x="46" y="858" class="code">api/debates.py · services/presence.py · services/tunnel_service.py · OnlineSimplePanel.jsx</text>
  <text x="46" y="882" class="subtitle">来源：PPT有效信息页内容 + docs/ai-debate-project-flow.mmd + 项目实际后端/前端文件。</text>
</svg>