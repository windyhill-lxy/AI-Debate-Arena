<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>上下文权限 · AI辩论场</title>
  <link rel="stylesheet" href="../shared/tokens.css">
</head>
<body>
  <section class="slide ">
    <div class="masthead"><span>AI DEBATE ARENA</span><span>第二幕 · 权限与可见性</span></div>
    
    <div class="eyebrow">后端 AI 上下文管理系统</div>
    <h2>不是所有 AI 都该看到所有信息，权限边界本身就是系统能力。</h2>
    
    
  <div class="columns"><article class="column"><h3>真实赛场视角</h3><p>只看到公开发言和自己应当看到的信息；队内讨论不会泄露给对方。</p></article><article class="column"><h3>上下文学习视角</h3><p>保留本方策略、内部思路和裁判反馈，适合训练与复盘。</p></article><article class="column"><h3>上帝视角</h3><p>老师、评委或开发者可观察全量队内讨论、策略与裁判判断。</p></article></div><p class="note">`ai_context_manager.py` 与 `message_visibility.py` 共同限制每位 AI 与每个观众能获得的信息，避免把队内策略错误暴露给对手。</p>
    <div class="footer"><span>上下文权限</span><span>AI 智能体开发专项赛</span></div>
  </section>
</body>
</html>
