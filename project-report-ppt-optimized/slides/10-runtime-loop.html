<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>单回合内核 · AI辩论场</title>
  <link rel="stylesheet" href="../shared/tokens.css">
</head>
<body>
  <section class="slide ">
    <div class="masthead"><span>AI DEBATE ARENA</span><span>第二幕 · 运行时内核</span></div>
    
    <div class="eyebrow">每一轮发言的生命周期</div>
    <h2>一段发言要经过检索、判断、反思与核查，不是直接把辩题丢给模型。</h2>
    
    
  <div class="flow"><article class="flow-item"><strong>RAG 检索</strong><span>从辩题资料、上传材料和历史上下文中取当前可用依据。</span></article><article class="flow-item"><strong>策略规划</strong><span>根据赛程阶段选择立论、反驳、盘问或总结的表达目标。</span></article><article class="flow-item"><strong>方向判断</strong><span>大模型判断本轮任务是否合理，避免偏离战场。</span></article><article class="flow-item"><strong>生成与反思</strong><span>非自由辩先形成内部草稿，再凝练为正式发言。</span></article><article class="flow-item"><strong>核查与评分</strong><span>事实核查失败回环重写；通过后裁判记录分数与风险。</span></article></div>
    <div class="footer"><span>单回合内核</span><span>AI 智能体开发专项赛</span></div>
  </section>
</body>
</html>
