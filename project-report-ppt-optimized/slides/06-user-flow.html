<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>用户路径 · AI辩论场</title>
  <link rel="stylesheet" href="../shared/tokens.css">
</head>
<body>
  <section class="slide ">
    <div class="masthead"><span>AI DEBATE ARENA</span><span>第二幕 · 用户路径</span></div>
    
    <div class="eyebrow">一次训练如何发生</div>
    <h2>系统把复杂辩论拆成可执行、可暂停、可复盘的训练流程。</h2>
    
    
  <div class="flow"><article class="flow-item"><strong>建立房间</strong><span>输入辩题，选择赛制、计时、可见性和参与身份。</span></article><article class="flow-item"><strong>导入资料</strong><span>上传参考材料，写入本场向量库，形成可引用来源。</span></article><article class="flow-item"><strong>自动推进</strong><span>赛程状态机控制环节，AI 辩手按职责发言。</span></article><article class="flow-item"><strong>人类介入</strong><span>轮到用户时暂停，AI 教练给建议但不代替提交。</span></article><article class="flow-item"><strong>赛后复盘</strong><span>裁判报告、逐字稿导出、回放分享沉淀训练记录。</span></article></div>
    <div class="footer"><span>用户路径</span><span>AI 智能体开发专项赛</span></div>
  </section>
