  <section class="slide ">
    <div class="masthead"><span>AI DEBATE ARENA</span><span>第一幕 · 问题定义</span></div>
    
    <div class="eyebrow">我们要解决的三件事</div>
    <h2>辩论训练最难的，不是写稿，而是反复经历完整对抗。</h2>
    
    
  <div class="card-grid"><article class="card"><h3>结构化赛制缺失</h3><p>通用 AI 对话缺乏立论、驳论、质询、自由辩论、总结陈词等正式环节的状态切换与限时约束。</p></article><article class="card"><h3>论据不可验证</h3><p>大模型容易生成看似权威但无法溯源的表述，「研究表明」「数据显示」背后可能没有真实来源。</p></article><article class="card"><h3>过程不可观测</h3><p>策略规划、队内讨论、事实核查等内部步骤如果不可见，评委和开发者无法判断系统是否真正在执行智能决策。</p></article></div><p class="note">核心判断：把 AI 辩论做成「可验证的训练场」，比做一个会说话的聊天机器人更有价值。</p>
