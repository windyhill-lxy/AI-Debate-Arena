<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>应用价值</title>
  <link rel="stylesheet" href="shared.css">
</head>
<body>
  <section class="slide">
    <div class="masthead">
      <span>Value</span>
      <span>教育与推广价值</span>
    </div>

    <div class="grid-2" style="height: 900px;">
      <div>
        <div class="kicker">应用价值</div>
        <h2>把 AI 素养训练落到一次具体、可复盘的辩论里。</h2>
        <p class="lead">
          学生在使用系统时，会自然接触工作流、提示词、RAG、输出校验、多智能体协同和实时通信。
          这些技术不再停留在概念层，而是在一场辩论中变成可观察、可解释的系统行为。
        </p>
      </div>

      <div class="panel" style="padding: 52px;">
        <h3>面向四类场景</h3>
        <p>
          课堂：老师用 AI 自主辩论演示“如何建立论证与反驳”。<br>
          社团：同学加入正反方，AI 补位，降低组局成本。<br>
          竞赛：学生讲清楚从需求分析到系统实现的完整过程。<br>
          个人训练：导出逐字稿与裁判报告，追踪自己的表达改进。
        </p>
        <div class="large-note">
          最终目标不是证明 AI 比人会辩论，而是让人更会提出问题、核验证据、组织表达。
        </div>
      </div>
    </div>
  </section>
</body>
</html>
