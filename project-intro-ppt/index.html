<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>AI 辩论场 · 项目介绍 PPT</title>
<script>
  window.DECK_MANIFEST = [
    { file: "slides/01-cover.html", label: "封面" },
    { file: "slides/02-real-problem.html", label: "现实问题" },
    { file: "slides/03-result-overview.html", label: "项目结果" },
    { file: "slides/04-user-journey.html", label: "用户路径" },
    { file: "slides/05-architecture.html", label: "系统架构" },
    { file: "slides/06-agents.html", label: "多智能体" },
    { file: "slides/07-workflow.html", label: "工作流设计" },
    { file: "slides/08-kernel-loop.html", label: "运行时内核" },
    { file: "slides/09-anti-hallucination.html", label: "防幻觉机制" },
    { file: "slides/10-human-ai.html", label: "人机协同" },
    { file: "slides/11-deployment.html", label: "跨端部署" },
    { file: "slides/12-engineering.html", label: "工程成果" },
    { file: "slides/13-value.html", label: "应用价值" },
  ];
  window.DECK_WIDTH = 1920;
  window.DECK_HEIGHT = 1080;
</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    overflow: hidden;
    background: #0f0c09;
    font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
  }
  body[data-mode="present"] .overview,
  body[data-mode="present"] .start-btn { display: none; }
  body[data-mode="overview"] #present-ui { display: none; }

  .overview {
    position: fixed;
    inset: 0;
    overflow: auto;
    padding: 72px 84px 120px;
    background:
      radial-gradient(circle at 50% 0%, rgba(239, 232, 219, 0.18), transparent 34%),
      linear-gradient(135deg, #f1eadf, #d8cbb7);
  }
  .overview-title {
    margin-bottom: 34px;
    text-align: center;
    color: rgba(34, 27, 21, 0.62);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-size: 15px;
  }
  .wall {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
    gap: 26px;
    perspective: 2000px;
  }
  .card {
    position: relative;
    aspect-ratio: 16 / 9;
    overflow: hidden;
    border-radius: 10px;
    background: #fff8ed;
    box-shadow: 0 22px 50px rgba(56, 42, 29, 0.22), 0 3px 10px rgba(56, 42, 29, 0.12);
    cursor: pointer;
    transition: transform 0.24s ease, box-shadow 0.24s ease;
  }
  .card:hover {
    transform: translateY(-8px) scale(1.04);
    box-shadow: 0 34px 76px rgba(56, 42, 29, 0.32), 0 6px 18px rgba(56, 42, 29, 0.18);
    z-index: 3;
  }
  .card iframe {
    width: 1920px;
    height: 1080px;
    border: 0;
    transform-origin: top left;
    pointer-events: none;
  }
  .num {
    position: absolute;
    left: 10px;
    bottom: 10px;
    padding: 5px 9px;
    border-radius: 999px;
    background: rgba(15, 12, 9, 0.72);
    color: #fff;
    font-size: 12px;
    letter-spacing: 0.04em;
  }
  .start-btn {
    position: fixed;
    right: 28px;
    bottom: 28px;
    z-index: 50;
    border: 0;
    border-radius: 999px;
    padding: 14px 26px;
    background: #221b15;
    color: #f7f0e4;
    font-size: 16px;
    letter-spacing: 0.06em;
    cursor: pointer;
    box-shadow: 0 12px 32px rgba(34, 27, 21, 0.28);
  }
  #stage {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 1920px;
    height: 1080px;
    transform-origin: top left;
    background: #fff;
    box-shadow: 0 16px 70px rgba(0,0,0,0.45);
  }
  #frame {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
    background: #fff;
  }
  .counter,
  .overview-btn {
    position: fixed;
    z-index: 60;
    border: 0;
    border-radius: 999px;
    background: rgba(0,0,0,0.58);
    color: rgba(255,255,255,0.86);
    font-size: 14px;
    letter-spacing: 0.05em;
  }
  .counter {
    right: 22px;
    bottom: 22px;
    padding: 7px 14px;
  }
  .overview-btn {
    left: 22px;
    top: 22px;
    padding: 8px 14px;
    cursor: pointer;
  }
  .nav {
    position: fixed;
    top: 0;
    bottom: 0;
    width: 18%;
    z-index: 40;
    cursor: pointer;
  }
  .nav.left { left: 0; }
  .nav.right { right: 0; }
  @media print {
    @page { size: 1920px 1080px; margin: 0; }
    body { overflow: visible; background: #fff; }
    .overview, .start-btn, .counter, .overview-btn, .nav, #present-ui { display: none !important; }
    .print-stack { display: block !important; }
    .print-stack iframe { width: 1920px; height: 1080px; page-break-after: always; border: 0; display: block; }
  }
</style>
</head>
<body data-mode="overview">
  <main class="overview">
    <div class="overview-title">AI Debate Arena · 点击任意页进入演示</div>
    <div class="wall" id="wall"></div>
  </main>
  <button class="start-btn" id="startBtn">开始演示</button>
  <section id="present-ui">
    <div id="stage"><iframe id="frame" src="about:blank"></iframe></div>
    <button class="overview-btn" id="overviewBtn">概览</button>
    <div class="nav left" id="prev"></div>
    <div class="nav right" id="next"></div>
    <div class="counter" id="counter"></div>
  </section>
  <div class="print-stack" id="printStack" style="display:none;"></div>

<script>
(function () {
  const deck = window.DECK_MANIFEST;
  const W = window.DECK_WIDTH;
  const H = window.DECK_HEIGHT;
  const wall = document.getElementById("wall");
  const stage = document.getElementById("stage");
  const frame = document.getElementById("frame");
  const counter = document.getElementById("counter");
  const printStack = document.getElementById("printStack");
  let current = Number(localStorage.getItem("ai-debate-deck-current") || 0);

  function buildOverview() {
    wall.innerHTML = "";
    deck.forEach((item, idx) => {
      const card = document.createElement("div");
      card.className = "card";
      const iframe = document.createElement("iframe");
      iframe.src = item.file;
      card.appendChild(iframe);
      const num = document.createElement("div");
      num.className = "num";
      num.textContent = `${idx + 1} · ${item.label}`;
      card.appendChild(num);
      card.addEventListener("click", () => {
        current = idx;
        present();
      });
      wall.appendChild(card);
    });
    requestAnimationFrame(resizeOverviewCards);
  }

  function resizeOverviewCards() {
    document.querySelectorAll(".card iframe").forEach((iframe) => {
      const rect = iframe.parentElement.getBoundingClientRect();
      iframe.style.transform = `scale(${rect.width / W})`;
    });
  }

  function fit() {
    const scale = Math.min(window.innerWidth / W, window.innerHeight / H);
    stage.style.transform = `translate(${-W * scale / 2}px, ${-H * scale / 2}px) scale(${scale})`;
  }

  function show(idx) {
    current = Math.max(0, Math.min(deck.length - 1, idx));
    localStorage.setItem("ai-debate-deck-current", String(current));
    frame.src = deck[current].file;
    counter.textContent = `${current + 1} / ${deck.length} · ${deck[current].label}`;
  }

  function present() {
    document.body.dataset.mode = "present";
    fit();
    show(current);
  }

  function overview() {
    document.body.dataset.mode = "overview";
    buildOverview();
  }

  function go(delta) {
    if (document.body.dataset.mode !== "present") return;
    show(current + delta);
  }

  function buildPrintStack() {
    printStack.innerHTML = "";
    deck.forEach((item) => {
      const iframe = document.createElement("iframe");
      iframe.src = item.file;
      printStack.appendChild(iframe);
    });
  }

  document.getElementById("startBtn").addEventListener("click", present);
  document.getElementById("overviewBtn").addEventListener("click", overview);
  document.getElementById("prev").addEventListener("click", () => go(-1));
  document.getElementById("next").addEventListener("click", () => go(1));
  window.addEventListener("resize", () => {
    fit();
    resizeOverviewCards();
  });
  window.addEventListener("beforeprint", buildPrintStack);
  window.addEventListener("keydown", (event) => {
    if (event.key === "Escape") overview();
    if (event.key === "ArrowRight" || event.key === " " || event.key === "PageDown") go(1);
    if (event.key === "ArrowLeft" || event.key === "PageUp") go(-1);
    if (event.key === "Home") { current = 0; present(); }
    if (event.key === "End") { current = deck.length - 1; present(); }
    if (event.key.toLowerCase() === "p") window.print();
  });

  buildOverview();
})();
</script>
</body>
</html>
